<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="zh-CN" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待审批通知 / Pending Review</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Helvetica,Arial,'Microsoft YaHei',sans-serif;color:#303133;-webkit-font-smoothing:antialiased;">
    <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f5f7fa;">
        <tr>
            <td align="center" style="padding:40px 16px;">
                <table role="presentation" width="560" border="0" cellspacing="0" cellpadding="0" style="max-width:560px;width:100%;background-color:#ffffff;border:1px solid #ebeef5;border-radius:4px;">

                    <!-- Header -->
                    <tr>
                        <td style="padding:24px 32px;border-bottom:1px solid #ebeef5;">
                            <div style="font-size:18px;font-weight:500;color:#303133;line-height:1.4;">
                                待审批通知
                            </div>
                            <div style="font-size:13px;color:#909399;margin-top:4px;">
                                Pending Review
                            </div>
                        </td>
                    </tr>

                    <!-- Form Info -->
                    <tr>
                        <td style="padding:24px 32px 8px 32px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td width="120" style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">
                                        单号 / No.
                                    </td>
                                    <td style="color:#303133;font-size:14px;padding:8px 0;">
                                        {{FormNo}}
                                    </td>
                                </tr>
                                <tr>
                                    <td style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">
                                        表单类型 / Type
                                    </td>
                                    <td style="color:#303133;font-size:14px;padding:8px 0;">
                                        {{FormTypeNameCn}} <span style="color:#c0c4cc;">/ {{FormTypeNameEn}}</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">
                                        当前步骤 / Step
                                    </td>
                                    <td style="color:#303133;font-size:14px;padding:8px 0;">
                                        {{CurrentStepNameCn}} <span style="color:#c0c4cc;">/ {{CurrentStepNameEn}}</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Action Links -->
                    <tr>
                        <td style="padding:16px 32px 8px 32px;">
                            <a href="{{ReviewUrl}}"
                               style="display:inline-block;background-color:#409eff;color:#ffffff;text-decoration:none;font-size:14px;padding:9px 20px;border-radius:4px;margin-right:8px;">
                                前往审批 / Review
                            </a>
                            <a href="{{LoginUrl}}"
                               style="display:inline-block;background-color:#ffffff;color:#409eff;text-decoration:none;font-size:14px;padding:8px 19px;border:1px solid #409eff;border-radius:4px;">
                                登入系统 / Sign In
                            </a>
                        </td>
                    </tr>

                    <!-- Notice -->
                    <tr>
                        <td style="padding:12px 32px 24px 32px;color:#e6a23c;font-size:12px;line-height:1.6;">
                            审批链接 15 天内有效 / Link expires in 15 days
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:24px 32px;color:#c0c4cc;font-size:12px;line-height:1.6;border-top:1px solid #ebeef5;">
                            系统自动发送，请勿回复 / Automated message, do not reply
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
